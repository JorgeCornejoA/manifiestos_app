plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.manifiestos_app"
    // compileSdk = 34
    compileSdkVersion 34  // <--- CAMBIAR A 34 (O el número fijo)
    // ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.example.manifiestos_app"
        minSdkVersion 23      // <--- CAMBIAR A 21 O 23 (Recomendado para Supabase)
        // minSdk = 23
        // targetSdk = 34
        targetSdkVersion 34   // <--- CAMBIAR A 34
        // versionCode = flutter.versionCode
        // versionCode flutterVersionCode.toInteger()
        versionCode 1
        // versionName flutterVersionName
        versionName "1.0.0"
        // versionName = flutter.versionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
